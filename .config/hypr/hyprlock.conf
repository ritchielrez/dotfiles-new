# Config borrowed from here: https://github.com/mahaveergurjar/Hyprlock-Dots/blob/main/.config/hyprlock/layouts/layout1.conf

$fn_greet=echo "<i> Hi $USER :) </i>"

# GENERAL
general {
  hide_cursor = true
  ignore_empty_input = true
  text_trim = true
}

# BACKGROUND
background {
  monitor = 
  path = screenshot
  blur_passes = 2
  contrast = 0.8916
  brightness = 0.7172
  vibrancy = 0.1696
  vibrancy_darkness = 0
}

# Time (hour part)
label {
  monitor =
  text = cmd[update:1000] echo "$(date +"%H")"
  color = rgb(250, 179, 135)
  shadow_size = 3
  shadow_color = rgb(0,0,0)
  shadow_boost = 1.2
  font_size = 150
  font_family = MartianMono Nerd Font Propo
  position = 0, -250
  halign = center
  valign = top
  zindex = 5
}

# Time (minute part)
label {
  monitor =
  text = cmd[update:1000] echo "$(date +"%M")"
  color = rgb(235, 160, 172)
  font_size = 150
  font_family = MartianMono Nerd Font Propo
  position = 0, -420
  halign = center
  valign = top
  zindex = 5
}

# Date
label {
  monitor =
  text = cmd[update:1000] echo "$(date +"%d %b %A")"
  color = rgb(249, 226, 175)
  font_size = 14
  font_family = MartianMono Nerd Font Propo
  position = 0, -130
  halign = center
  valign = center
  zindex = 5
}

# INPUT FIELD
input-field {
  monitor =
  size = 200, 50
  outline_thickness = 0
  outer_color = rgb(30, 30, 46)
  dots_size = 0.1 # Scale of input-field height, 0.2 - 0.8
  dots_spacing = 1 # Scale of dots' absolute size, 0.0 - 1.0
  dots_center = true
  inner_color = rgb(205, 214, 244)
  font_family = MartianMono Nerd Font Propo
  font_color = rgb(30, 30, 46)
  fade_on_empty = false
  # placeholder_text = <i>Login $USER </i>
  placeholder_text =<i>Hii $USER ;) </i>
  # invert_numlock = true # change color if numlock is off
  # capslock_color = 1
  # numlock_color = 1
  # bothlock_color = 1 
  hide_input = false
  position = 0, -220
  halign = center
  valign = center
  zindex = 20
  check_color = rgb(30, 30, 46)
  fail_color = rgb(243, 139, 168)
}
